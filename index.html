<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DSA Patterns — Interview Prep Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Spotify-inspired: near-black surfaces, green accent, high contrast */
    --bg: #000000; --bg-1: #0a0a0a; --bg-2: #121212; --bg-3: #1a1a1a;
    --bg-hover: #1f1f1f; --elev: #181818; --line: #282828; --line-2: #333333;
    --txt: #ffffff; --txt-2: #b3b3b3; --txt-3: #7a7a7a;
    --accent: #1db954; --accent-hi: #1ed760; --accent-dim: rgba(29,185,84,.16);
    --easy: #1db954; --med: #f5a623; --hard: #f0374e;
    --p1: #f0374e; --p2: #f5a623; --p3: #1db954;
    --ok: #1db954;
    --r: 8px; --r-lg: 12px; --tap: 44px;
    --sidebar-w: 280px; --topbar-h: 60px;
    font-family: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--txt); }
  body { -webkit-font-smoothing: antialiased; line-height: 1.5; }
  code, .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  a { color: var(--txt); text-decoration: none; }
  a:hover { color: var(--accent-hi); }
  button { font: inherit; cursor: pointer; color: inherit; background: none; border: none; }
  ::selection { background: var(--accent-dim); }
  /* scrollbars */
  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 8px; border: 3px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; background-clip: content-box; }

  /* Layout */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: var(--sidebar-w); flex-shrink: 0; background: var(--bg);
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
    padding: 16px 8px 24px; display: flex; flex-direction: column; gap: 8px;
  }
  .main { flex: 1; min-width: 0; background: linear-gradient(180deg, #131313 0%, var(--bg-2) 220px); }

  /* Sidebar header + stats */
  .brand { display: flex; align-items: center; gap: 11px; padding: 4px 12px 6px; }
  .brand .dot { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent-hi), #159c43);
    display: flex; align-items: center; justify-content: center; }
  .brand h1 { font-size: 18px; font-weight: 800; letter-spacing: -.4px; line-height: 1.1; }
  .brand .sub { color: var(--txt-3); font-size: 11px; font-weight: 500; }

  .stats { background: var(--bg-2); border-radius: var(--r-lg); padding: 14px; }
  .stats .grid3 { display: flex; gap: 6px; text-align: left; }
  .stats .cell { flex: 1; }
  .stats .cell .n { font-size: 22px; font-weight: 800; letter-spacing: -.5px; line-height: 1; font-variant-numeric: tabular-nums; }
  .stats .cell .l { font-size: 9px; text-transform: uppercase; letter-spacing: .7px; color: var(--txt-3); font-weight: 700; margin-top: 4px; }
  .stats .cell.solved .n { color: var(--accent); }
  .stats .cell.done .n { color: var(--accent); }
  .bar { height: 6px; background: #000; border-radius: 4px; overflow: hidden; margin: 14px 0 10px; }
  .bar > i { display: block; height: 100%; width: 0; background: var(--accent); border-radius: 4px; transition: width .35s ease; }
  .diffcounts { display: flex; gap: 14px; font-size: 11px; color: var(--txt-3); }
  .diffcounts b { color: var(--txt-2); font-weight: 700; font-variant-numeric: tabular-nums; }
  .swatch { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

  .navhdr { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--txt-3);
    font-weight: 700; padding: 8px 12px 4px; }
  /* Pattern nav */
  .navlist { display: flex; flex-direction: column; gap: 1px; overflow-y: auto; }
  .navitem { display: block; padding: 7px 12px; border-radius: 6px; color: var(--txt-2);
    font-size: 13px; }
  .navitem:hover { background: var(--bg-hover); color: var(--txt); }
  .navitem.active { background: var(--bg-3); color: var(--txt); }
  .navitem .row1 { display: flex; align-items: center; gap: 9px; }
  .navitem .ndot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--line-2); transition: background .2s; }
  .navitem.done .ndot { background: var(--accent); }
  .navitem .nm { flex: 1; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .navitem .cnt { font-size: 11px; color: var(--txt-3); font-variant-numeric: tabular-nums; font-weight: 600; }
  .navitem.done .cnt { color: var(--accent); }
  .navbar { height: 3px; background: #000; border-radius: 3px; margin-top: 6px; margin-left: 16px; overflow: hidden; }
  .navbar > i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .3s; }

  /* Top bar (sticky) */
  .topbar { position: sticky; top: 0; z-index: 30; height: var(--topbar-h);
    display: flex; align-items: center; gap: 16px; padding: 0 clamp(16px, 2.5vw, 28px);
    background: rgba(10,10,10,.72); backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px); border-bottom: 1px solid var(--line); }
  .topbar .lead { display: flex; align-items: baseline; gap: 12px; min-width: 0; flex-shrink: 0; }
  .topbar .lead h2 { font-size: 19px; font-weight: 800; letter-spacing: -.4px; white-space: nowrap; }
  .topbar .lead .crumbs { font-size: 12px; color: var(--txt-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  @media (max-width: 1180px) { .topbar .lead h2 { display: none; } }
  .topbar .spacer { flex: 1; }
  .filterbar { display: flex; align-items: center; gap: 6px; }
  .fgroup { display: flex; gap: 3px; background: var(--bg-2); padding: 3px; border-radius: 999px; }
  .chip { height: 30px; padding: 0 13px; border-radius: 999px; font-size: 12px;
    font-weight: 700; color: var(--txt-2); white-space: nowrap; letter-spacing: .1px; }
  .chip:hover { color: var(--txt); }
  .chip.on { background: var(--txt); color: #000; }
  .fdivider { width: 1px; height: 20px; background: var(--line-2); margin: 0 3px; }

  .search { position: relative; width: 190px; }
  .search input { width: 100%; height: 36px; background: var(--bg-2);
    border: 1px solid transparent; border-radius: 999px; color: var(--txt);
    padding: 0 14px 0 36px; font-size: 13px; }
  .search input:focus { outline: none; border-color: var(--txt-3); background: var(--bg-3); }
  .search .icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--txt-3); pointer-events: none; }
  .iconbtn { width: 36px; height: 36px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; color: var(--txt-2);
    background: var(--bg-2); flex-shrink: 0; }
  .iconbtn:hover { color: var(--txt); background: var(--bg-3); transform: scale(1.05); }
  .iconbtn.danger:hover { color: var(--hard); }

  .content { padding: 20px clamp(16px, 2.5vw, 28px) 90px; }

  /* Pattern cards */
  .card { background: var(--bg-2); border-radius: var(--r-lg); margin-bottom: 12px;
    overflow: hidden; border: 1px solid transparent; transition: background .15s; }
  .card:hover { background: #171717; }
  .card.open { background: var(--bg-2); border-color: var(--line); }
  .card > .head { display: flex; align-items: center; gap: 14px; padding: 14px 18px;
    cursor: pointer; user-select: none; }
  .card .pnum { font-size: 13px; color: var(--txt-3); font-weight: 700;
    font-variant-numeric: tabular-nums; min-width: 22px; }
  .card .pdotc { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; background: var(--line-2); }
  .card.pdone .pdotc { background: var(--accent); }
  .card .ptitle { flex: 1; min-width: 0; }
  .card .ptitle .r1 { display: flex; align-items: center; gap: 10px; }
  .card .ptitle h3 { font-size: 16px; font-weight: 700; letter-spacing: -.2px; }
  .card .ptitle .meta { font-size: 11px; color: var(--txt-3); margin-top: 3px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .card .ptitle .meta .mono { color: var(--txt-2); font-size: 11px; }
  .prio { font-size: 9.5px; font-weight: 800; padding: 3px 8px; border-radius: 5px; letter-spacing: .4px; text-transform: uppercase; }
  .prio.P1 { background: rgba(240,55,78,.16); color: var(--p1); }
  .prio.P2 { background: rgba(245,166,35,.16); color: var(--p2); }
  .prio.P3 { background: rgba(29,185,84,.16); color: var(--p3); }
  .card .pprog { font-size: 13px; color: var(--txt-2); font-variant-numeric: tabular-nums;
    display: flex; align-items: center; gap: 12px; font-weight: 600; }
  .card .pprog .minibar { width: 90px; height: 5px; background: #000; border-radius: 3px; overflow: hidden; }
  .card .pprog .minibar > i { display: block; height: 100%; background: var(--accent); width: 0; transition: width .3s; }
  .caret { color: var(--txt-3); transition: transform .2s; }
  .card.open .caret { transform: rotate(90deg); color: var(--txt); }

  .card > .body { display: none; padding: 0 18px 16px; }
  .card.open > .body { display: block; }

  /* Template + info */
  .info { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 2px 0 16px; }
  .info .block { background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--r); padding: 13px 15px; }
  .info .block h4 { font-size: 10px; text-transform: uppercase; letter-spacing: .8px;
    color: var(--accent); margin-bottom: 8px; font-weight: 800; }
  .info .block p { font-size: 13px; color: var(--txt-2); }
  .info .triggers { display: flex; flex-wrap: wrap; gap: 6px; }
  .info .triggers span { font-size: 11px; background: var(--bg-3); border-radius: 5px; padding: 4px 9px; color: var(--txt-2); font-weight: 500; }
  .tmpl { grid-column: 1 / -1; }
  .tmpl pre { background: #000; border: 1px solid var(--line); border-radius: var(--r);
    padding: 15px; overflow-x: auto; font-size: 12.5px; line-height: 1.65; color: #c9d4e0; }

  /* Problem table */
  .ptable { width: 100%; border-collapse: collapse; }
  .ptable th { text-align: left; font-size: 10px; text-transform: uppercase;
    letter-spacing: .7px; color: var(--txt-3); font-weight: 700; padding: 6px 10px 10px;
    border-bottom: 1px solid var(--line); }
  .ptable td { padding: 9px 10px; border-bottom: 1px solid rgba(255,255,255,.04);
    font-size: 13px; vertical-align: middle; }
  .ptable tbody tr { transition: background .12s; }
  .ptable tbody tr:hover { background: var(--bg-hover); }
  .ptable tbody tr:hover td { border-radius: 0; }
  .ptable tr:last-child td { border-bottom: none; }
  .ptable tr.solved .pname a { color: var(--txt-3); text-decoration: line-through; }
  .ptable tr.solved .idx, .ptable tr.solved .hint, .ptable tr.solved .insight, .ptable tr.solved .co { opacity: .45; }
  .cbcell { width: 40px; }
  .cb { width: 20px; height: 20px; border: 2px solid var(--line-2); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; background: transparent; margin: 0 auto; transition: all .15s; }
  .cbtap { display: flex; align-items: center; justify-content: center;
    min-width: var(--tap); min-height: var(--tap); margin: -11px 0; }
  .cbtap:hover .cb { border-color: var(--accent); }
  .cb.on { background: var(--accent); border-color: var(--accent); }
  .cb svg { opacity: 0; transform: scale(.5); transition: all .15s; }
  .cb.on svg { opacity: 1; transform: scale(1); }
  .idx { color: var(--txt-3); font-variant-numeric: tabular-nums; width: 26px; font-weight: 600; }
  .pdot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .pdot.P1 { background: var(--p1); } .pdot.P2 { background: var(--p2); } .pdot.P3 { background: var(--p3); }
  .pname { min-width: 190px; font-weight: 600; }
  .pname a { font-size: 13.5px; }
  .diff { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
  .diff.E { background: rgba(29,185,84,.14); color: var(--easy); }
  .diff.M { background: rgba(245,166,35,.14); color: var(--med); }
  .diff.H { background: rgba(240,55,78,.14); color: var(--hard); }
  .co { font-size: 10px; color: var(--txt-3); font-family: 'JetBrains Mono', monospace; letter-spacing: -.2px; }
  .hint { color: var(--txt-2); font-size: 12px; }
  .insight { color: var(--txt-3); font-size: 12px; }

  .empty { text-align: center; color: var(--txt-3); padding: 70px 20px; font-weight: 600; }

  /* Mobile */
  .hamburger { display: none; }
  .scrim { display: none; }
  @media (max-width: 1000px) {
    .card .pprog .minibar { width: 60px; }
    .col-insight, .th-insight { display: none; }
  }
  @media (max-width: 860px) {
    .info { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed; left: 0; top: 0; z-index: 50; transform: translateX(-100%);
      transition: transform .25s ease; box-shadow: 0 8px 40px rgba(0,0,0,.7);
      background: var(--bg-1); border-right: 1px solid var(--line);
    }
    body.nav-open .sidebar { transform: translateX(0); }
    body.nav-open .scrim { display: block; position: fixed; inset: 0; z-index: 40; background: rgba(0,0,0,.6); }
    .hamburger { display: flex; align-items: center; justify-content: center;
      width: var(--tap); height: var(--tap); color: var(--txt); flex-shrink: 0; margin-left: -8px; }
    .topbar .lead h2 { font-size: 17px; }
    .topbar .lead .crumbs { display: none; }
    .filterbar { gap: 5px; }
  }
  @media (max-width: 680px) {
    /* filter bar wraps below title on narrow screens */
    .topbar { height: auto; flex-wrap: wrap; padding: 10px clamp(12px,4vw,20px); gap: 10px; }
    .topbar .spacer { display: none; }
    .filterbar { width: 100%; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; }
    .search { width: 150px; margin-left: auto; }
    .col-co, .th-co { display: none; }
  }
  @media (max-width: 560px) {
    .col-hint, .th-hint { display: none; }
    .card .pprog .minibar { display: none; }
    .card .ptitle .meta .mono { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <span class="dot"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span>
      <div><h1>DSA Mastery</h1><div class="sub">25 patterns · 250 problems</div></div>
    </div>
    <div class="stats">
      <div class="grid3">
        <div class="cell solved"><div class="n" id="solvedN">0</div><div class="l">Solved</div></div>
        <div class="cell"><div class="n" id="totalN">250</div><div class="l">Total</div></div>
        <div class="cell done"><div class="n" id="pctLbl">0%</div><div class="l">Done</div></div>
      </div>
      <div class="bar"><i id="overallBar"></i></div>
      <div class="diffcounts">
        <div><span class="swatch" style="background:var(--easy)"></span><b id="eN">0</b> Easy</div>
        <div><span class="swatch" style="background:var(--med)"></span><b id="mN">0</b> Med</div>
        <div><span class="swatch" style="background:var(--hard)"></span><b id="hN">0</b> Hard</div>
      </div>
    </div>
    <div class="navhdr">Patterns</div>
    <nav class="navlist" id="navlist"></nav>
  </aside>
  <div class="scrim" id="scrim"></div>

  <main class="main">
    <header class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="lead">
        <h2>DSA Mastery</h2>
        <span class="crumbs">250 problems · 25 patterns · FAANG</span>
      </div>
      <div class="spacer"></div>
      <div class="filterbar">
        <div class="fgroup" id="chipsState"></div>
        <div class="fgroup" id="chipsDiff"></div>
        <div class="fgroup" id="chipsPrio"></div>
        <div class="fdivider"></div>
        <button class="iconbtn" id="expandAll" title="Expand / collapse all" aria-label="Expand all">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 13 12 18 17 13"/><polyline points="7 6 12 11 17 6"/></svg>
        </button>
        <button class="iconbtn" id="exportBtn" title="Export progress" aria-label="Export progress">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="iconbtn" id="importBtn" title="Import progress" aria-label="Import progress">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <button class="iconbtn danger" id="resetBtn" title="Reset progress" aria-label="Reset progress">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
        <div class="search">
          <span class="icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          <input id="search" type="search" placeholder="Search  /" autocomplete="off" aria-label="Search problems">
        </div>
        <input type="file" id="importFile" accept="application/json" hidden>
      </div>
    </header>
    <div class="content">
      <div id="cards"></div>
      <div class="empty" id="empty" hidden>No problems match your filters.</div>
    </div>
  </main>
</div>

<script src="data.js"></script>
<script>
(() => {
  const KEY = 'dsa-patterns-progress-v1';
  const load = () => { try { return new Set(JSON.parse(localStorage.getItem(KEY)) || []); } catch { return new Set(); } };
  const save = s => localStorage.setItem(KEY, JSON.stringify([...s]));
  let solved = load();

  const pid = (p, i) => `${p.id}#${i}`;           // stable per-problem key
  const DIFF_NAME = { E: 'Easy', M: 'Medium', H: 'Hard' };
  // Independent filter dimensions that combine (AND):
  let fState = 'all';   // all | solved | unsolved
  let fDiff = 'all';    // all | E | M | H
  let fPrio = 'all';    // all | P1 | P2 | P3
  let query = '';

  const $ = s => document.querySelector(s);
  const el = (t, c, h) => { const e = document.createElement(t); if (c) e.className = c; if (h != null) e.innerHTML = h; return e; };
  const esc = s => s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  const CHECK = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

  // ---- Build the cards (once) ----
  const cardsWrap = $('#cards');
  PATTERNS.forEach(p => {
    const card = el('div', 'card'); card.dataset.pid = p.id;

    const head = el('div', 'head');
    head.innerHTML = `
      <span class="pnum">${String(p.number).padStart(2, '0')}</span>
      <span class="pdotc"></span>
      <span class="ptitle">
        <div class="r1"><h3>${esc(p.name)}</h3><span class="prio ${p.priority}">${p.priority}</span></div>
        <span class="meta">
          <span class="mono">⏱ ${esc(p.time)}</span>
          <span class="mono">◇ ${esc(p.space)}</span>
          <span>${p.problems.length} problems</span>
        </span>
      </span>
      <span class="pprog"><span class="pp-lbl">0/${p.problems.length}</span><span class="minibar"><i></i></span></span>
      <span class="caret"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>`;
    head.addEventListener('click', () => {
      const opening = !card.classList.contains('open');
      card.classList.toggle('open');
      navlist.querySelectorAll('.navitem').forEach(n => n.classList.toggle('active', opening && n.dataset.pid === p.id));
    });
    card.appendChild(head);

    const body = el('div', 'body');
    const info = el('div', 'info');
    info.innerHTML = `
      <div class="block"><h4>When to use</h4><p>${esc(p.whenToUse)}</p></div>
      <div class="block"><h4>Trigger signals</h4><div class="triggers">${p.triggers.map(t => `<span>${esc(t)}</span>`).join('')}</div></div>
      <div class="block" style="grid-column:1/-1"><h4>Core idea</h4><p>${esc(p.coreIdea)}</p></div>
      <div class="block tmpl"><h4>Template · Python</h4><pre><code>${esc(p.template)}</code></pre></div>`;
    body.appendChild(info);

    const table = el('table', 'ptable');
    table.innerHTML = `<thead><tr>
      <th class="cbcell"></th><th>#</th><th></th><th>Problem</th><th>Diff</th>
      <th class="th-co">Companies</th><th class="th-hint">Hint</th><th class="th-insight">Key insight</th>
    </tr></thead>`;
    const tb = el('tbody');
    p.problems.forEach((pr, i) => {
      const [name, slug, diff, prio, co, hint, insight] = pr;
      const key = pid(p, i);
      const tr = el('tr'); tr.dataset.key = key;
      tr.dataset.name = name.toLowerCase();
      tr.dataset.hint = (hint + ' ' + insight).toLowerCase();
      tr.dataset.diff = diff; tr.dataset.prio = prio;
      tr.innerHTML = `
        <td class="cbcell"><div class="cbtap" role="checkbox" tabindex="0" aria-label="Mark solved: ${esc(name)}"><div class="cb">${CHECK}</div></div></td>
        <td class="idx">${i + 1}</td>
        <td><span class="pdot ${prio}" title="${prio}"></span></td>
        <td class="pname"><a href="${LC}${slug}" target="_blank" rel="noopener">${esc(name)}</a></td>
        <td><span class="diff ${diff}" title="${DIFF_NAME[diff]}">${diff}</span></td>
        <td class="col-co co">${esc(co)}</td>
        <td class="col-hint hint">${esc(hint)}</td>
        <td class="col-insight insight">${esc(insight)}</td>`;
      const toggle = () => { solved.has(key) ? solved.delete(key) : solved.add(key); save(solved); refresh(); };
      const tap = tr.querySelector('.cbtap');
      tap.addEventListener('click', toggle);
      tap.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(); } });
      tb.appendChild(tr);
    });
    table.appendChild(tb);
    body.appendChild(table);
    card.appendChild(body);
    cardsWrap.appendChild(card);
  });

  // ---- Sidebar nav ----
  const navlist = $('#navlist');
  PATTERNS.forEach(p => {
    const a = el('a', 'navitem'); a.href = '#'; a.dataset.pid = p.id;
    a.innerHTML = `<span class="row1">
        <span class="ndot"></span>
        <span class="nm">${esc(p.name)}</span>
        <span class="cnt">0/${p.problems.length}</span>
      </span><span class="navbar"><i></i></span>`;
    a.addEventListener('click', e => {
      e.preventDefault();
      const card = cardsWrap.querySelector(`.card[data-pid="${p.id}"]`);
      card.classList.add('open');
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      navlist.querySelectorAll('.navitem').forEach(n => n.classList.toggle('active', n === a));
      document.body.classList.remove('nav-open');
    });
    navlist.appendChild(a);
  });

  // ---- Filter chips: three independent groups (state / difficulty / priority) ----
  function buildGroup(wrapSel, opts, setter) {
    const wrap = $(wrapSel);
    opts.forEach(([v, label]) => {
      const b = el('button', 'chip' + (v === 'all' ? ' on' : ''), label);
      b.dataset.v = v;
      b.addEventListener('click', () => {
        setter(v);
        wrap.querySelectorAll('.chip').forEach(c => c.classList.toggle('on', c.dataset.v === v));
        refresh();
      });
      wrap.appendChild(b);
    });
  }
  buildGroup('#chipsState', [['all', 'All'], ['unsolved', 'Unsolved'], ['solved', 'Solved']], v => fState = v);
  buildGroup('#chipsDiff', [['all', 'Diff'], ['E', 'Easy'], ['M', 'Med'], ['H', 'Hard']], v => fDiff = v);
  buildGroup('#chipsPrio', [['all', 'Prio'], ['P1', 'P1'], ['P2', 'P2'], ['P3', 'P3']], v => fPrio = v);

  // ---- Filtering + stats refresh ----
  function rowVisible(tr) {
    const key = tr.dataset.key, isSolved = solved.has(key);
    if (fState === 'solved' && !isSolved) return false;
    if (fState === 'unsolved' && isSolved) return false;
    if (fDiff !== 'all' && tr.dataset.diff !== fDiff) return false;
    if (fPrio !== 'all' && tr.dataset.prio !== fPrio) return false;
    if (query && !tr.dataset.name.includes(query) && !tr.dataset.hint.includes(query)) return false;
    return true;
  }

  function refresh() {
    let total = 0, sN = 0, e = 0, m = 0, h = 0, anyVisible = false;
    PATTERNS.forEach(p => {
      const card = cardsWrap.querySelector(`.card[data-pid="${p.id}"]`);
      let pSolved = 0, pVisible = 0;
      p.problems.forEach((pr, i) => {
        const key = pid(p, i);
        const tr = card.querySelector(`tr[data-key="${key}"]`);
        const isSolved = solved.has(key);
        total++;
        if (isSolved) { sN++; if (pr[2] === 'E') e++; else if (pr[2] === 'M') m++; else h++; pSolved++; }
        const vis = rowVisible(tr);
        tr.hidden = !vis;
        tr.classList.toggle('solved', isSolved);
        tr.querySelector('.cb').classList.toggle('on', isSolved);
        tr.querySelector('.cbtap').setAttribute('aria-checked', isSolved);
        if (vis) { pVisible++; anyVisible = true; }
      });
      // card visibility
      card.hidden = pVisible === 0;
      // per-pattern progress
      const n = p.problems.length, pctP = Math.round(pSolved / n * 100), allDone = pSolved === n;
      card.querySelector('.pp-lbl').textContent = `${pSolved}/${n}`;
      card.querySelector('.pprog .minibar > i').style.width = pctP + '%';
      card.classList.toggle('pdone', allDone);
      const nav = navlist.querySelector(`.navitem[data-pid="${p.id}"]`);
      nav.querySelector('.cnt').textContent = `${pSolved}/${n}`;
      nav.querySelector('.navbar > i').style.width = pctP + '%';
      nav.classList.toggle('done', allDone);
    });
    $('#solvedN').textContent = sN;
    $('#totalN').textContent = total;
    const pct = total ? Math.round(sN / total * 100) : 0;
    $('#pctLbl').textContent = pct + '%';
    $('#overallBar').style.width = pct + '%';
    $('#eN').textContent = e; $('#mN').textContent = m; $('#hN').textContent = h;
    $('#empty').hidden = anyVisible;
  }

  // ---- Toolbar actions ----
  const searchInput = $('#search');
  searchInput.addEventListener('input', () => { query = searchInput.value.trim().toLowerCase(); refresh(); });

  $('#expandAll').addEventListener('click', function () {
    const cards = [...cardsWrap.querySelectorAll('.card')].filter(c => !c.hidden);
    const anyClosed = cards.some(c => !c.classList.contains('open'));
    cards.forEach(c => c.classList.toggle('open', anyClosed));
    this.classList.toggle('on', anyClosed);
  });

  $('#resetBtn').addEventListener('click', () => {
    if (confirm('Reset all progress on this device? This cannot be undone.')) {
      solved = new Set(); save(solved); refresh();
    }
  });

  // Export / Import (manual cross-device sync — localStorage is per-device)
  $('#exportBtn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify({ v: 1, solved: [...solved], exported: new Date().toISOString() }, null, 2)],
      { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = el('a'); a.href = url;
    a.download = `dsa-progress-${new Date().toISOString().slice(0, 10)}.json`;
    a.click(); URL.revokeObjectURL(url);
  });
  $('#importBtn').addEventListener('click', () => $('#importFile').click());
  $('#importFile').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        const arr = Array.isArray(data) ? data : data.solved;
        if (!Array.isArray(arr)) throw new Error('bad format');
        const mode = confirm('OK = merge with current progress. Cancel = replace it.');
        solved = mode ? new Set([...solved, ...arr]) : new Set(arr);
        save(solved); refresh();
        alert(`Imported ${arr.length} solved problems.`);
      } catch { alert('Could not read that file — expected a JSON export from this app.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // ---- Mobile nav ----
  $('#hamburger').addEventListener('click', () => document.body.classList.toggle('nav-open'));
  $('#scrim').addEventListener('click', () => document.body.classList.remove('nav-open'));

  // ---- Keyboard: / focuses search, Esc clears ----
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== searchInput) { e.preventDefault(); searchInput.focus(); }
    else if (e.key === 'Escape') {
      if (document.activeElement === searchInput && searchInput.value) { searchInput.value = ''; query = ''; refresh(); }
      document.body.classList.remove('nav-open');
    }
  });

  refresh();
})();
</script>
</body>
</html>
